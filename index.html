.scrubber{display:grid;grid-template-columns:auto 1fr auto auto;align-items:center;gap:16px;padding:8px 18px;border-top:1px solid var(--border-strong);border-bottom:1px solid var(--border-strong);background:#fffcec;min-height:42px;flex-shrink:0}
.scrubber .label{font-size:11px;text-transform:uppercase;letter-spacing:1.3px;color:var(--text-dim);font-weight:600;white-space:nowrap}
.scrubber .label b{color:var(--text-bright);font-weight:700;letter-spacing:0;text-transform:none;font-size:12.5px;padding:1px 5px;background:#fff;border:1px solid var(--border-strong);margin:0 3px}
.scrubber input[type=range]{-webkit-appearance:none;appearance:none;width:100%;height:6px;background:#fff;border:1px solid var(--border-strong);border-radius:0;padding:0;outline:none}
.scrubber input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;background:#000;cursor:pointer;border:1px solid #000;box-shadow:0 0 0 2px #fffcec, 0 0 0 3px #000}
.scrubber input[type=range]::-moz-range-thumb{width:18px;height:18px;background:#000;cursor:pointer;border:1px solid #000;box-shadow:0 0 0 2px #fffcec, 0 0 0 3px #000}
.scrubber button{padding:5px 12px;font-size:11.5px;text-transform:lowercase;letter-spacing:.3px;background:#fff;border:1px solid var(--border-strong);color:var(--text);font-weight:600;white-space:nowrap}
.scrubber button:hover{border-color:#000;color:var(--text-bright)}
.scrubber button.live{background:#000;border-color:#000;color:#fff}
.scrubber .ts{font-size:12px;color:var(--text-dim);min-width:100px;text-align:right;font-weight:500;font-variant-numeric:tabular-nums}

/* ── Login screen ─────────────────────────────────────────────────────── */
.login-shell{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:var(--bg);padding:24px;z-index:50;
  background-image:
    linear-gradient(var(--surface-2) 1px, transparent 1px),
    linear-gradient(90deg, var(--surface-2) 1px, transparent 1px);
  background-size: 32px 32px, 32px 32px;
}
.login-card{background:#fff;border:1px solid #000;width:100%;max-width:440px;display:flex;flex-direction:column;box-shadow:8px 8px 0 var(--surface-3)}
.login-head{padding:22px 26px 14px;border-bottom:1px solid var(--border-strong)}
.login-brand{display:flex;align-items:center;gap:10px;font-size:18px;font-weight:700;color:var(--text-bright);letter-spacing:.2px}
.login-brand-mark{display:inline-flex;align-items:center;justify-content:center;width:30px;height:30px;background:#000;color:#fff;font-size:18px}
.login-sub{margin-top:6px;font-size:12px;color:var(--text-dim);font-weight:500}
.login-tabs{display:flex;border-bottom:1px solid var(--border-strong);background:var(--surface-2)}
.login-tabs button{flex:1;padding:10px 14px;font-family:var(--mono);font-size:12px;background:transparent;border:none;color:var(--text-dim);cursor:pointer;border-bottom:3px solid transparent;text-transform:lowercase;letter-spacing:.3px;font-weight:600}
.login-tabs button.active{color:var(--text-bright);background:#fff;border-bottom-color:#000}
.login-tabs button:not(.active):hover{color:var(--text-bright)}
.login-body{padding:20px 26px;display:flex;flex-direction:column;gap:16px}
.login-field{display:flex;flex-direction:column;gap:5px}
.login-label{font-size:10.5px;text-transform:uppercase;letter-spacing:1.4px;color:var(--text-dim);font-weight:700}
.login-input-wrap{display:flex;align-items:stretch;border:1px solid var(--border-strong);background:#fff}
.login-input-wrap:focus-within{border-color:#000;box-shadow:inset 0 0 0 1px #000}
.login-input-wrap input{flex:1;border:none;padding:8px 10px;font-family:var(--mono);font-size:13px;background:transparent;outline:none}
.login-input-wrap input:focus{box-shadow:none}
.login-prefix,.login-suffix{display:flex;align-items:center;padding:0 9px;font-family:var(--mono);font-size:13px;color:var(--text-dim);background:var(--surface-2);font-weight:500}
.login-prefix{border-right:1px solid var(--border)}
.login-suffix{border-left:1px solid var(--border)}
.login-hint{font-size:11px;color:var(--text-dim)}
.login-remember{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--text);cursor:pointer;user-select:none}
.login-remember input{width:14px;height:14px;cursor:pointer;accent-color:#000}
.login-hint.link{color:var(--triad-structure);cursor:pointer;text-decoration:underline;text-underline-offset:2px;align-self:flex-end;margin-top:-2px}
.login-err{padding:8px 12px;background:#fdf0f0;border:1px solid var(--red);color:var(--red);font-size:12px;font-weight:500}
.login-actions{display:flex;flex-direction:column;gap:12px;margin-top:4px}
.login-primary{padding:10px 16px;background:#000;color:#fff;border:1px solid #000;font-family:var(--mono);font-size:13px;font-weight:700;cursor:pointer;letter-spacing:.4px;text-transform:lowercase}
.login-primary:hover:not(:disabled){background:#222}
.login-primary:disabled{opacity:.5;cursor:wait}
.login-divider{display:flex;align-items:center;gap:10px;color:var(--text-dim);font-size:11px}
.login-divider:before,.login-divider:after{content:'';flex:1;height:1px;background:var(--border)}
.login-ghost{padding:9px 16px;background:#fff;color:var(--text-bright);border:1px solid var(--border-strong);font-family:var(--mono);font-size:13px;font-weight:600;cursor:pointer;letter-spacing:.3px;text-transform:lowercase}
.login-ghost:hover:not(:disabled){border-color:#000;background:var(--surface-2)}
.login-foot{padding:13px 26px;background:var(--surface-2);border-top:1px solid var(--border);display:flex;flex-direction:column;gap:2px;font-size:11px;color:var(--text-dim);line-height:1.5}
.login-foot .muted{color:var(--text-faint)}
.register-pitch{padding:14px 16px;background:var(--surface-2);border:1px solid var(--border-strong);border-left:3px solid var(--triad-structure)}
.register-pitch-title{font-size:13px;color:var(--text-bright);font-weight:700;margin-bottom:6px}
.register-pitch-body{font-size:12px;color:var(--text-dim);line-height:1.55}
.register-pitch-body b{color:var(--text-bright);font-weight:700}

/* ── Workspaces home (post-login launchpad) ──────────────────────────── */
.wh-shell{position:fixed;inset:0;display:flex;flex-direction:column;background:var(--bg);overflow:auto;
  background-image:
    linear-gradient(var(--surface-2) 1px, transparent 1px),
    linear-gradient(90deg, var(--surface-2) 1px, transparent 1px);
  background-size: 32px 32px, 32px 32px;
}
.wh-topbar{display:flex;align-items:center;gap:12px;padding:9px 16px;border-bottom:1px solid var(--border-strong);background:var(--surface);min-height:46px}
.wh-brand{display:flex;align-items:center;gap:9px;font-size:14px;font-weight:700;color:var(--text-bright);letter-spacing:.2px;font-family:var(--mono)}
.wh-brand-mark{display:inline-flex;align-items:center;justify-content:center;width:26px;height:26px;background:#000;color:#fff;font-size:14px}
.wh-spacer{flex:1}
.wh-body{flex:1;display:flex;flex-direction:column;align-items:center;padding:60px 32px 80px;max-width:1080px;margin:0 auto;width:100%}
.wh-hero{text-align:center;margin-bottom:40px;max-width:560px}
.wh-greeting{font-size:28px;font-weight:700;color:var(--text-bright);letter-spacing:.2px;margin-bottom:10px;font-family:var(--mono);text-transform:lowercase}
.wh-tagline{font-size:14px;color:var(--text-dim);line-height:1.55}
.wh-stale-hint{margin-top:12px;padding:8px 12px;background:#fffcec;border:1px solid var(--signal);color:var(--text);font-size:12px;display:inline-block}
.wh-loading{font-size:13px;color:var(--text-dim);padding:40px 0;font-family:var(--mono)}
.wh-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px;width:100%;max-width:920px}
.wh-card{display:flex;flex-direction:column;align-items:flex-start;gap:8px;padding:18px 18px 16px;background:#fff;border:1px solid var(--border-strong);cursor:pointer;text-align:left;font-family:var(--mono);min-height:140px;transition:transform .08s ease, box-shadow .08s ease;position:relative}
.wh-card:hover{border-color:#000;box-shadow:4px 4px 0 var(--surface-3);transform:translate(-1px,-1px)}
.wh-card-sigil{display:inline-flex;align-items:center;justify-content:center;width:38px;height:38px;background:var(--triad-structure);color:#fff;font-size:18px;font-weight:700;flex-shrink:0}
.wh-card-sigil-new{background:#fff;color:#000;border:1px dashed var(--border-strong);font-size:22px;font-weight:400}
.wh-card-name{font-size:15px;color:var(--text-bright);font-weight:700;line-height:1.25;word-break:break-word}
.wh-card-meta{font-size:11px;color:var(--text-dim);font-weight:500}
.wh-card-action{margin-top:auto;font-size:11px;color:var(--triad-structure);font-weight:700;text-transform:uppercase;letter-spacing:.8px}
.wh-card-invite{border-left:3px solid var(--signal);background:#fffcec}
.wh-card-invite .wh-card-sigil{background:var(--signal)}
.wh-card-suspect{border-left:3px solid var(--triad-significance);background:#fff4f4}
.wh-card-suspect .wh-card-sigil{background:var(--triad-significance)}
.wh-card-suspect .wh-card-meta{color:var(--triad-significance)}
.wh-card-new{cursor:default;background:var(--surface-2);border-style:dashed}
.wh-card-new:hover{border-color:var(--border-strong);box-shadow:none;transform:none}
.wh-new-form{display:flex;gap:6px;width:100%;margin-top:4px}
.wh-new-input{flex:1;font-size:13px;padding:7px 9px;border:1px solid var(--border-strong);background:#fff;font-family:var(--mono);outline:none;min-width:0}
.wh-new-input:focus{border-color:#000;box-shadow:inset 0 0 0 1px #000}
.wh-new-btn{padding:7px 14px;background:#000;color:#fff;border:1px solid #000;font-family:var(--mono);font-size:12.5px;font-weight:700;cursor:pointer;text-transform:lowercase;letter-spacing:.3px;flex-shrink:0}
.wh-new-btn:hover:not(:disabled){background:#222}
.wh-new-btn:disabled{opacity:.45;cursor:not-allowed}
.wh-card-err{font-size:11px;color:var(--red);font-weight:600;margin-top:4px}
@media (max-width:560px){
  .wh-body{padding:32px 18px 60px}
  .wh-greeting{font-size:22px}
  .wh-grid{grid-template-columns:1fr;max-width:none}
}

/* ── Identity chip (in topbar) ────────────────────────────────────────── */
.identity-chip{position:relative}
.ic-btn{display:flex;align-items:center;gap:7px;padding:4px 9px 4px 4px;border:1px solid var(--border-strong);background:#fff;cursor:pointer;font-size:12.5px;color:var(--text-bright);min-height:30px;font-weight:500}
.ic-btn:hover{border-color:#000}
.ic-avatar{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;background:#000;color:#fff;font-size:11.5px;font-weight:700}
.ic-mxid{font-family:var(--mono)}
.ic-caret{color:var(--text-dim);font-size:10px}
.ic-panel{position:absolute;top:calc(100% + 4px);left:0;background:#fff;border:1px solid #000;min-width:280px;z-index:35;box-shadow:4px 4px 0 var(--surface-3);display:flex;flex-direction:column}
.ic-panel-head{display:flex;gap:12px;padding:14px;border-bottom:1px solid var(--border-strong);background:var(--surface-2)}
.ic-panel-avatar{display:inline-flex;align-items:center;justify-content:center;width:38px;height:38px;background:#000;color:#fff;font-size:18px;font-weight:700;flex-shrink:0}
.ic-panel-mxid{font-size:13px;color:var(--text-bright);font-weight:700;font-family:var(--mono);word-break:break-all}
.ic-panel-sub{font-size:11px;color:var(--text-dim);margin-top:1px}
.ic-panel-item{padding:9px 14px;background:transparent;border:none;border-bottom:1px solid var(--border);text-align:left;font-family:var(--mono);font-size:12.5px;color:var(--text);cursor:pointer;text-transform:lowercase;font-weight:500}
.ic-panel-item:last-child{border-bottom:none}
.ic-panel-item:hover{background:var(--surface-2);color:var(--text-bright)}
.ic-panel-item.danger{color:var(--red)}
.ic-panel-item.danger:hover{background:#fdf0f0}

/* ── Spaces picker ────────────────────────────────────────────────────── */
.spaces-picker{position:relative}
.sp-btn{display:flex;align-items:center;gap:7px;padding:4px 9px;border:1px solid var(--border-strong);background:#fff;cursor:pointer;font-size:12.5px;color:var(--text-bright);min-height:30px;font-weight:500;font-family:var(--mono)}
.sp-btn:hover{border-color:#000}
.sp-sigil{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;background:var(--triad-structure);color:#fff;font-size:12px;font-weight:700;font-family:var(--mono)}
.sp-name{font-weight:600}
.sp-meta{color:var(--text-dim);font-size:11px;font-weight:500}
.sp-caret{color:var(--text-dim);font-size:10px;margin-left:2px}
.sp-panel{position:absolute;top:calc(100% + 4px);left:0;background:#fff;border:1px solid #000;min-width:320px;z-index:32;box-shadow:4px 4px 0 var(--surface-3);display:flex;flex-direction:column}
.sp-panel-head{padding:9px 12px;border-bottom:1px solid var(--border-strong);font-size:10.5px;text-transform:uppercase;letter-spacing:1.3px;color:var(--text-dim);background:var(--surface-2);font-weight:700}
.sp-row{display:flex;align-items:center;gap:10px;padding:9px 12px;border-bottom:1px solid var(--border);cursor:pointer;border-left:3px solid transparent}
.sp-row:hover{background:var(--surface-2)}
.sp-row.active{border-left-color:#000;background:var(--surface-2)}
.sp-row-sigil{display:inline-flex;align-items:center;justify-content:center;width:28px;height:28px;background:var(--triad-structure);color:#fff;font-size:13px;font-weight:700;font-family:var(--mono);flex-shrink:0}
.sp-row-body{flex:1;min-width:0}
.sp-row-name{font-size:13px;color:var(--text-bright);font-weight:600;font-family:var(--mono)}
.sp-row-meta{font-size:11px;color:var(--text-dim);margin-top:1px}
.sp-row-share{padding:3px 10px;background:#fff;border:1px solid var(--border-strong);font-family:var(--mono);font-size:11px;color:var(--text);cursor:pointer;text-transform:lowercase;letter-spacing:.3px;font-weight:600}
.sp-row-share:hover{border-color:#000;background:#000;color:#fff}
.sp-new{display:flex;gap:5px;padding:9px 12px;background:var(--surface-2);border-top:1px solid var(--border)}
.sp-new input{flex:1;font-size:12px}
.sp-new button{padding:4px 10px;background:#000;color:#fff;border:1px solid #000;font-family:var(--mono);font-size:11.5px;font-weight:600}

/* ── Share-space dialog ───────────────────────────────────────────────── */
.share-overlay{position:fixed;inset:0;background:rgba(20,18,12,0.42);display:flex;align-items:center;justify-content:center;z-index:60;padding:24px;backdrop-filter:blur(2px)}
.share-card{background:#fff;border:1px solid #000;width:100%;max-width:540px;max-height:90vh;overflow:auto;box-shadow:8px 8px 0 var(--surface-3);display:flex;flex-direction:column}
.share-head{padding:16px 20px;border-bottom:1px solid var(--border-strong);display:flex;justify-content:space-between;align-items:flex-start;gap:14px;background:var(--surface-2)}
.share-title{font-size:15px;color:var(--text-bright);font-weight:700;font-family:var(--mono)}
.share-name{color:var(--triad-structure)}
.share-sub{font-size:11.5px;color:var(--text-dim);margin-top:3px;font-family:var(--mono)}
.share-close{font-size:22px;line-height:1;color:var(--text-dim);background:transparent;border:none;cursor:pointer;padding:0 4px;font-family:var(--mono)}
.share-close:hover{color:#000}
.share-section{padding:14px 20px;border-bottom:1px solid var(--border)}
.share-section:last-child{border-bottom:none}
.share-section-label{font-size:10.5px;text-transform:uppercase;letter-spacing:1.4px;color:var(--text-dim);font-weight:700;margin-bottom:8px}
.share-invite-row{display:flex;gap:6px}
.share-invite-row input{flex:1;font-size:12.5px;padding:6px 10px}
.share-invite-row select{padding:6px 8px;font-size:12px;background:#fff}
.share-invite{padding:6px 14px;background:#000;color:#fff;border:1px solid #000;font-family:var(--mono);font-size:12px;font-weight:600;cursor:pointer;text-transform:lowercase;letter-spacing:.3px}
.share-invite:hover{background:#222}
.share-hint{margin-top:6px;font-size:11px;color:var(--text-dim);line-height:1.5}
.share-link-row{display:flex;align-items:stretch;border:1px solid var(--border-strong)}
.share-link{flex:1;padding:8px 10px;font-family:var(--mono);font-size:12px;color:var(--text-bright);background:var(--surface-2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;border-right:1px solid var(--border)}
.share-copy{padding:0 14px;background:#fff;border:none;border-left:1px solid var(--border);font-family:var(--mono);font-size:12px;color:var(--text);cursor:pointer;text-transform:lowercase;letter-spacing:.3px;font-weight:600}
.share-copy:hover{background:#000;color:#fff}
.share-members{display:flex;flex-direction:column;gap:5px;max-height:240px;overflow-y:auto}
.share-member{display:flex;align-items:center;gap:9px;padding:6px 8px;background:#fff;border:1px solid var(--border);font-family:var(--mono)}
.share-member:hover{border-color:var(--border-strong)}
.share-member-avatar{display:inline-flex;align-items:center;justify-content:center;width:24px;height:24px;background:var(--surface-3);color:var(--text-bright);font-size:11.5px;font-weight:700;flex-shrink:0}
.share-member-mxid{flex:1;font-size:12px;color:var(--text-bright);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.share-member-role{padding:3px 6px;font-size:11px;border:1px solid var(--border);background:#fff;cursor:pointer}
.share-member-role.role-admin{color:var(--red);border-color:var(--red)}
.share-member-role.role-member{color:var(--text-bright)}
.share-member-role.role-viewer{color:var(--text-dim)}
.share-member-remove{padding:0 7px;font-size:15px;line-height:1;background:transparent;border:1px solid transparent;color:var(--text-dim);cursor:pointer;font-family:var(--mono)}
.share-member-remove:hover{color:var(--red);border-color:var(--red)}

/* utility */
.muted{color:var(--text-dim)}
.faint{color:var(--text-faint)}
.bright{color:var(--text-bright)}
.accent{color:var(--text-bright)}
.hidden{display:none!important}
.kbd{font-family:var(--mono);font-size:10px;padding:0 5px;border:1px solid var(--border);background:#fff;color:var(--text-dim)}

/* ── Sub-view tabs (mobile log view) ─────────────────────────────────── */
.subtabs{display:none}

/* ── Responsive ──────────────────────────────────────────────────────── */
@media (max-width: 760px) {
  body{font-size:12.5px}
  .topbar{padding:6px 10px;gap:7px;min-height:auto}
  .brand .sub{display:none}
  .mode-group-label{display:none}
  .modes button{padding:3px 8px;font-size:10.5px}

  /* Log view: stack the 2 columns into tabs */
  .db{grid-template-columns:1fr;grid-template-rows:auto minmax(0,1fr)}
  .subtabs{display:flex;border-bottom:1px solid var(--border);background:var(--surface)}
  .subtabs button{flex:1;padding:6px 8px;font-size:11px;background:transparent;border:none;border-bottom:2px solid transparent;color:var(--text-dim);cursor:pointer;text-transform:lowercase;letter-spacing:.4px}
  .subtabs button.active{color:var(--text-bright);border-bottom-color:#000}
  .col{border-right:none;border-bottom:1px solid var(--border)}
  .col.hidden-sub{display:none}

  /* Table view */
  .tv-head, .app-head{padding:8px 12px;gap:8px}
  .tv-head h2, .app-head h2{font-size:13px}
  .tv-head .right, .app-head .right{display:none}
  .tv-body.single{padding:10px}
  .tv-tabs{padding:0 8px}
  .tv-tab{padding:6px 10px;font-size:11.5px}
  table.dbgrid th, table.dbgrid td{padding:4px 7px}

  /* Kanban — keep horizontal scroll but narrower columns */
  .kanban{grid-auto-columns:minmax(220px,1fr);padding:10px;gap:8px}

  /* Graph — smaller panels */
  .gv-legend, .gv-detail{font-size:10.5px;padding:6px 8px}
  .gv-detail{min-width:200px;max-width:260px}

  /* Ops palette — wrap more */
  .ops-grid{padding:6px 10px}

  /* Scrubber */
  .scrubber{padding:6px 10px;grid-template-columns:auto 1fr auto;gap:8px}
  .scrubber .ts{display:none}
}

@media (max-width: 480px) {
  .modes button{padding:2px 7px;font-size:10.5px}
  .room-picker .pickbtn{font-size:11px;padding:2px 7px}
  .room-picker .panel{min-width:240px}
  .scrubber .label{font-size:9.5px}
  .scrubber button{padding:2px 7px;font-size:10px}
  .tv-tab .trows{display:none}
}

/* ── New-set (create table) form — airtable-style inline builder ──────── */
.ct-form{margin:18px 24px 24px;background:#fff;border:1px solid var(--border-strong);font-family:var(--mono);display:flex;flex-direction:column;max-width:780px}
.ct-head{padding:16px 20px 14px;border-bottom:1px solid var(--border)}
.ct-eyebrow{font-size:10.5px;text-transform:uppercase;letter-spacing:1.5px;color:var(--text-dim);font-weight:700;margin-bottom:8px}
.ct-name-input{width:100%;font-family:var(--mono);font-size:18px;font-weight:700;color:var(--text-bright);padding:6px 10px;border:1px solid var(--border-strong);outline:none;background:#fff;border-radius:0}
.ct-name-input:focus{border-color:#000}
.ct-warn{display:block;margin-top:6px;font-size:11px;color:var(--triad-significance);letter-spacing:.2px}
.ct-warn b{color:var(--triad-significance);font-weight:700}
.ct-fields-head{display:flex;align-items:baseline;justify-content:space-between;padding:14px 20px 6px;font-size:10.5px;text-transform:uppercase;letter-spacing:1.5px;color:var(--text-dim);font-weight:700}
.ct-fields-sub{text-transform:none;font-size:11px;letter-spacing:0;color:var(--text-faint);font-weight:400;font-style:italic;max-width:50%;text-align:right}
.ct-fields{display:flex;flex-direction:column;padding:0 20px 10px}
.ct-field-row{display:grid;grid-template-columns:24px 1fr 200px 28px;gap:8px;align-items:center;padding:5px 0;border-bottom:1px dashed var(--border)}
.ct-field-row:last-of-type{border-bottom:none}
.ct-field-row.primary .ct-field-num{color:var(--triad-significance)}
.ct-field-num{font-size:11px;color:var(--text-faint);text-align:center;font-weight:600}
.ct-field-name{font-family:var(--mono);font-size:13px;padding:5px 9px;border:1px solid var(--border);background:#fff;color:var(--text-bright);border-radius:0;outline:none}
.ct-field-name:focus{border-color:#000}
.ct-field-type{font-family:var(--mono);font-size:12px;padding:5px 8px;border:1px solid var(--border);background:#fff;color:var(--text);cursor:pointer;border-radius:0;outline:none}
.ct-field-type:focus{border-color:#000}
.ct-field-remove{width:24px;height:24px;background:transparent;border:1px solid transparent;color:var(--text-faint);cursor:pointer;font-size:16px;line-height:1;display:flex;align-items:center;justify-content:center}
.ct-field-remove:hover:not(:disabled){background:#fff;color:var(--triad-significance);border-color:var(--triad-significance)}
.ct-field-remove:disabled{cursor:not-allowed;opacity:.25}
.ct-add-field{align-self:flex-start;margin-top:10px;padding:6px 14px;background:transparent;border:1px dashed var(--border-strong);color:var(--text-dim);font-family:var(--mono);font-size:11.5px;text-transform:lowercase;letter-spacing:.3px;cursor:pointer;font-weight:600}
.ct-add-field:hover{border-style:solid;border-color:#000;color:var(--text-bright);background:var(--surface-2)}
.ct-actions{display:flex;justify-content:flex-end;gap:8px;padding:14px 20px;border-top:1px solid var(--border);background:var(--surface-2)}
.ct-cancel{padding:7px 16px;background:#fff;border:1px solid var(--border-strong);color:var(--text-dim);font-family:var(--mono);font-size:12px;cursor:pointer;font-weight:600;text-transform:lowercase;letter-spacing:.3px}
.ct-cancel:hover{border-color:#000;color:var(--text-bright)}
.ct-create{padding:7px 18px;background:#000;border:1px solid #000;color:#fff;font-family:var(--mono);font-size:12px;cursor:pointer;font-weight:700;text-transform:lowercase;letter-spacing:.3px}
.ct-create:hover:not(:disabled){background:#222}
.ct-create:disabled{background:var(--text-faint);border-color:var(--text-faint);cursor:not-allowed}

/* ── CSV import modal (airtable-style) ────────────────────────────────── */
.csv-modal-backdrop{position:fixed;inset:0;background:rgba(20,20,20,.45);display:flex;align-items:flex-start;justify-content:center;padding:32px 20px;z-index:100;overflow:auto;animation:proj-fade .12s ease}
.csv-modal{background:#fff;border:1px solid #000;width:min(1080px,calc(100vw - 40px));max-height:calc(100vh - 64px);display:flex;flex-direction:column;font-family:var(--mono);box-shadow:0 24px 60px -16px rgba(0,0,0,.4);animation:proj-rise .14s ease}
.csv-head{display:flex;align-items:flex-start;justify-content:space-between;padding:16px 22px 14px;border-bottom:1px solid var(--border);background:linear-gradient(180deg,#fff 0%,var(--surface-2) 100%)}
.csv-eyebrow{font-size:10.5px;text-transform:uppercase;letter-spacing:1.5px;color:var(--text-dim);font-weight:700;margin-bottom:5px}
.csv-filename{font-size:18px;font-weight:700;color:var(--text-bright);letter-spacing:.1px}
.csv-fileinfo{font-size:11.5px;color:var(--text-dim);margin-top:3px}
.csv-close{width:30px;height:30px;background:transparent;border:1px solid transparent;color:var(--text-dim);font-size:18px;line-height:1;cursor:pointer;font-family:var(--mono)}
.csv-close:hover:not(:disabled){border-color:#000;color:var(--text-bright)}
.csv-close:disabled{opacity:.3;cursor:not-allowed}

.csv-body{padding:6px 22px 16px;overflow:auto;display:flex;flex-direction:column;gap:14px;flex:1;min-height:0}
.csv-section{display:flex;flex-direction:column;gap:8px;padding-top:10px}
.csv-section-head{display:flex;align-items:baseline;justify-content:space-between;gap:14px}
.csv-section-label{font-size:10.5px;text-transform:uppercase;letter-spacing:1.5px;color:var(--text-dim);font-weight:700}
.csv-header-toggle{display:flex;align-items:center;gap:6px;font-size:11.5px;color:var(--text-dim);cursor:pointer}
.csv-header-toggle input{accent-color:#000;cursor:pointer}

.csv-dest-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.csv-dest-opt{display:flex;align-items:center;gap:10px;padding:11px 14px;background:#fff;border:1px solid var(--border-strong);cursor:pointer;font-size:12.5px;color:var(--text)}
.csv-dest-opt.on{border-color:#000;background:var(--surface-2)}
.csv-dest-opt.disabled{opacity:.4;cursor:not-allowed}
.csv-dest-opt input[type="radio"]{accent-color:#000;cursor:pointer;margin:0}
.csv-dest-opt input[type="radio"]:disabled{cursor:not-allowed}
.csv-dest-name{font-weight:600;color:var(--text-bright);white-space:nowrap}
.csv-dest-input,.csv-dest-select{flex:1;font-family:var(--mono);font-size:13px;padding:5px 8px;border:1px solid var(--border);background:#fff;color:var(--text-bright);border-radius:0;outline:none;min-width:0}
.csv-dest-input:focus,.csv-dest-select:focus{border-color:#000}
.csv-dest-input:disabled,.csv-dest-select:disabled{background:var(--surface-3);color:var(--text-faint);cursor:not-allowed}
.csv-warn{font-size:10.5px;color:var(--triad-significance);text-transform:uppercase;letter-spacing:.8px;font-weight:700;white-space:nowrap}

.csv-map{display:flex;flex-direction:column;border:1px solid var(--border-strong);background:#fff;max-height:320px;overflow:auto}
.csv-map-row{display:grid;grid-template-columns:minmax(140px,1.4fr) 18px 1.4fr 130px 72px;gap:10px;align-items:center;padding:7px 12px;border-bottom:1px solid var(--border);font-size:12.5px}
.csv-map-row:last-child{border-bottom:none}
.csv-map-row.skip{background:var(--surface-3);color:var(--text-faint)}
.csv-map-row.skip .csv-col-name,.csv-map-row.skip .csv-col-preview{color:var(--text-faint);text-decoration:line-through}
.csv-map-head{position:sticky;top:0;background:var(--surface-2);font-size:10.5px;text-transform:uppercase;letter-spacing:1.2px;color:var(--text-dim);font-weight:700;padding:8px 12px;border-bottom:1px solid var(--border-strong);z-index:2}
.csv-map-head .csv-map-arrow{text-align:center}
.csv-map-csvcol{display:flex;flex-direction:column;min-width:0;gap:1px}
.csv-col-name{font-weight:700;color:var(--text-bright);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.csv-col-preview{font-size:11px;color:var(--text-faint);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-style:italic}
.csv-map-arrow{color:var(--text-faint);text-align:center}
.csv-map-target{display:flex;gap:6px;align-items:center;min-width:0}
.csv-map-newname{flex:1;font-family:var(--mono);font-size:12.5px;padding:4px 8px;border:1px solid var(--border);background:#fff;color:var(--text-bright);border-radius:0;outline:none;min-width:0}
.csv-map-newname:focus{border-color:#000}
.csv-map-targetsel{flex:1;font-family:var(--mono);font-size:12.5px;padding:4px 8px;border:1px solid var(--border);background:#fff;color:var(--text-bright);border-radius:0;outline:none;min-width:0}
.csv-map-targetsel:focus{border-color:#000}
.csv-map-undo{padding:3px 7px;font-size:10.5px;background:transparent;border:1px solid var(--border);color:var(--text-dim);cursor:pointer;font-family:var(--mono);white-space:nowrap}
.csv-map-undo:hover{border-color:#000;color:var(--text-bright)}
.csv-map-type select{width:100%;font-family:var(--mono);font-size:12px;padding:4px 8px;border:1px solid var(--border);background:#fff;color:var(--text);border-radius:0;outline:none;cursor:pointer}
.csv-map-type select:focus{border-color:#000}
.csv-map-type select:disabled{background:var(--surface-3);color:var(--text-faint);cursor:not-allowed}
.csv-map-skip{width:100%;padding:4px 8px;font-size:11px;background:#fff;border:1px solid var(--border);color:var(--text-dim);cursor:pointer;font-family:var(--mono);font-weight:600;text-transform:lowercase;letter-spacing:.2px}
.csv-map-skip:hover{border-color:#000;color:var(--text-bright)}

.csv-preview-wrap{border:1px solid var(--border-strong);background:#fff;overflow:auto;max-height:220px}
table.csv-preview{width:100%;border-collapse:collapse;font-size:11.5px}
table.csv-preview th{position:sticky;top:0;background:var(--surface-2);border-bottom:1px solid var(--border-strong);border-right:1px solid var(--border);padding:6px 10px;text-align:left;font-family:var(--mono);font-weight:700;font-size:11px;color:var(--text-bright);white-space:nowrap;vertical-align:top}
table.csv-preview th.skip{background:var(--surface-3);color:var(--text-faint)}
.csv-prev-target{font-weight:700;color:var(--text-bright);text-transform:lowercase}
.csv-prev-src{font-size:10px;color:var(--text-faint);font-weight:400;margin-top:1px;font-style:italic}
table.csv-preview td{padding:5px 10px;border-bottom:1px solid var(--border);border-right:1px solid var(--border);color:var(--text);font-family:var(--mono);white-space:nowrap;max-width:240px;overflow:hidden;text-overflow:ellipsis}
table.csv-preview td.skip{background:var(--surface-3);color:var(--text-faint)}
table.csv-preview tr:last-child td{border-bottom:none}

.csv-state-block{padding:36px 20px;display:flex;flex-direction:column;align-items:center;gap:8px;color:var(--text-dim);font-size:13px;text-align:center}
.csv-state-block.csv-state-error{color:var(--triad-significance)}
.csv-state-block.csv-state-done{color:var(--triad-existence)}
.csv-state-glyph{font-size:30px;line-height:1;color:var(--text-faint)}
.csv-state-block.csv-state-error .csv-state-glyph{color:var(--triad-significance)}
.csv-state-block.csv-state-done .csv-state-glyph{color:var(--triad-existence)}
.csv-state-sub{font-size:11.5px;color:var(--text-faint);max-width:520px;line-height:1.5}
.csv-progress{width:280px;height:6px;background:var(--surface-3);border:1px solid var(--border);margin-top:6px;overflow:hidden}
.csv-progress-fill{height:100%;background:#000;transition:width .15s linear}

.csv-foot{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:14px 22px;border-top:1px solid var(--border);background:var(--surface-2);flex:0 0 auto}
.csv-foot-note{font-size:11px;color:var(--text-dim);display:flex;gap:14px;align-items:baseline;flex-wrap:wrap}
.csv-foot-evt b{color:var(--text-bright);font-weight:700}
.csv-foot-evt-detail{color:var(--text-faint);font-size:10.5px}
.csv-foot-actions{display:flex;gap:8px}
.csv-cancel{padding:8px 16px;background:#fff;border:1px solid var(--border-strong);color:var(--text-dim);font-family:var(--mono);font-size:12px;cursor:pointer;font-weight:600;text-transform:lowercase;letter-spacing:.3px}
.csv-cancel:hover:not(:disabled){border-color:#000;color:var(--text-bright)}
.csv-cancel:disabled{opacity:.4;cursor:not-allowed}
.csv-import{padding:8px 18px;background:#000;border:1px solid #000;color:#fff;font-family:var(--mono);font-size:12px;cursor:pointer;font-weight:700;text-transform:lowercase;letter-spacing:.3px}
.csv-import:hover:not(:disabled){background:#222}
.csv-import:disabled{background:var(--text-faint);border-color:var(--text-faint);cursor:not-allowed}
</style>
</head>
